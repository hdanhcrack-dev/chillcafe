<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hương Coffee • Cà phê chill mỗi ngày</title>
  <!-- Font awesome 6 (miễn phí) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: #f9f3ea;
      color: #3e2c1b;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* header chill */
    header {
      background: rgba(255, 248, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.2);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 15px 20px;
    }

    .logo {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #6f4e37, #b68b40);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo i {
      background: none;
      -webkit-text-fill-color: #b68b40;
      font-size: 2rem;
    }

    nav {
      display: flex;
      gap: 25px;
      align-items: center;
    }
    nav a {
      text-decoration: none;
      font-weight: 500;
      color: #4a3927;
      transition: 0.2s;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    nav a:hover {
      color: #b68b40;
      transform: translateY(-1px);
    }

    .cart-icon {
      background: #f3e5d3;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 600;
      color: #4a3927;
      transition: 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cart-icon:hover {
      background: #e7d4bc;
    }
    #cart-count {
      background: #b68b40;
      color: white;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* hero */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center 45%;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      border-radius: 0 0 50px 50px;
      margin-bottom: 30px;
    }
    .hero-content h1 {
      font-size: 3.2rem;
      font-weight: 700;
      text-shadow: 2px 4px 12px rgba(0,0,0,0.5);
      margin-bottom: 12px;
    }
    .hero-content p {
      font-size: 1.3rem;
      max-width: 500px;
      margin: 0 auto;
      opacity: 0.9;
      text-shadow: 1px 1px 6px black;
    }

    .section-title {
      font-size: 2.2rem;
      margin: 40px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #4a3927;
    }
    .section-title i {
      color: #b68b40;
      font-size: 2rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 20px 15px 22px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid #f0e4d4;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 35px rgba(110, 70, 20, 0.12);
      border-color: #dbbc87;
    }
    .card img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #f3e5d3;
      background: #fefaf5;
    }
    .card h3 {
      font-size: 1.3rem;
      margin: 8px 0 5px;
      color: #3e2c1b;
    }
    .price {
      font-weight: 700;
      font-size: 1.3rem;
      color: #6f4e37;
      margin: 8px 0 14px;
    }
    .add-btn {
      background: #b68b40;
      border: none;
      color: white;
      padding: 10px 22px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #b68b40, #8b691b);
    }
    .add-btn:hover {
      background: linear-gradient(135deg, #c9a24d, #9e7c2c);
      transform: scale(1.02);
    }

    /* giỏ hàng */
    .cart-panel {
      background: white;
      border-radius: 28px;
      padding: 20px 25px;
      margin: 30px 0 50px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.06);
    }
    .cart-items {
      margin: 10px 0;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ede0cf;
      padding: 12px 0;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #b66;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .total {
      font-weight: 700;
      font-size: 1.3rem;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
    }
    .checkout-btn {
      background: #3e2c1b;
      border: none;
      color: white;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: bold;
      width: 100%;
      margin-top: 18px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .checkout-btn:hover {
      background: #5a402b;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #6b5a47;
      border-top: 1px solid #e2d2bd;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .header-inner {
        flex-direction: column;
        gap: 10px;
      }
      .hero-content h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner container">
      <div class="logo">
        <i class="fas fa-mug-hot"></i> Hương Coffee
      </div>
      <nav>
        <a href="#"><i class="fas fa-home"></i> Home</a>
        <a href="#menu"><i class="fas fa-bars"></i> Menu</a>
        <a href="#cart-section"><i class="fas fa-shopping-bag"></i> Order</a>
        <div class="cart-icon" id="cart-toggle">
          <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Chill cùng tách cà phê</h1>
      <p>Không gian ấm • Hương vị đậm đà • Giao hàng tận nơi</p>
    </div>
  </section>

  <main class="container">
    <div id="menu">
      <h2 class="section-title"><i class="fas fa-leaf"></i> Thực đơn hôm nay</h2>
    </div>
    <div class="menu-grid" id="menu-container"></div>

    <div id="cart-section" class="cart-panel">
      <h2 style="display: flex; align-items: center; gap: 8px;"><i class="fas fa-receipt"></i> Giỏ hàng của bạn</h2>
      <div id="cart-items" class="cart-items">Giỏ hàng trống.</div>
      <div class="total" id="cart-total">Tổng: 0₫</div>
      <button class="checkout-btn" id="checkout-btn"><i class="fas fa-credit-card"></i> Thanh toán</button>
    </div>
  </main>

  <footer>
    <p>© 2025 Hương Coffee Chill • Mở cửa 7:00 - 22:00 • <i class="fas fa-phone"></i> 0900 123 456</p>
    <p style="margin-top: 6px;">✨ Đặt bàn & giao hàng tận nơi ✨</p>
  </footer>

  <script>
    (function() {
      // Menu dữ liệu quán cà phê chill
      const menuItems = [
        { id: 1, name: "Espresso Đen", price: 45000, img: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Đậm đà nguyên bản" },
        { id: 2, name: "Cappuccino kem", price: 55000, img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Bọt sữa mịn" },
        { id: 3, name: "Latte Hạnh Nhân", price: 60000, img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Ngọt thanh, chill" },
        { id: 4, name: "Trà Đào Cam Sả", price: 50000, img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Tươi mát" },
        { id: 5, name: "Bạc Xỉu Đá", price: 40000, img: "https://images.unsplash.com/photo-1530370629826-6eb2f4b3b4b3?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Sữa nhiều, êm dịu" },
        { id: 6, name: "Cold Brew Táo", price: 65000, img: "https://images.unsplash.com/photo-1517959035875-5dcfb38bce34?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80", desc: "Thanh mát" }
      ];

      // Giỏ hàng (lưu trong session/object)
      let cart = [];

      // Hiển thị menu
      const menuContainer = document.getElementById('menu-container');
      function renderMenu() {
        menuContainer.innerHTML = menuItems.map(item => `
          <div class="card">
            <img src="${item.img}" alt="${item.name}" loading="lazy">
            <h3>${item.name}</h3>
            <p style="color:#7b6b5a; font-size:0.9rem;">${item.desc || ''}</p>
            <div class="price">${item.price.toLocaleString('vi-VN')}₫</div>
            <button class="add-btn" data-id="${item.id}"><i class="fas fa-plus-circle"></i> Thêm vào giỏ</button>
          </div>
        `).join('');
      }

      // Cập nhật giao diện giỏ hàng
      function updateCartUI() {
        const cartItemsDiv = document.getElementById('cart-items');
        const cartCountSpan = document.getElementById('cart-count');
        const cartTotalSpan = document.getElementById('cart-total');
        
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCountSpan.textContent = totalItems;

        if (cart.length === 0) {
          cartItemsDiv.innerHTML = '<p style="color:#9b8c7c; padding:10px 0;">🛒 Giỏ hàng trống, hãy chọn món chill nhé.</p>';
          cartTotalSpan.innerHTML = 'Tổng: 0₫';
          return;
        }

        let html = '';
        let totalPrice = 0;
        cart.forEach((cartItem, index) => {
          const itemTotal = cartItem.price * cartItem.quantity;
          totalPrice += itemTotal;
          html += `
            <div class="cart-item">
              <span><strong>${cartItem.name}</strong> (x${cartItem.quantity})</span>
              <span style="display:flex; align-items:center; gap:12px;">
                ${itemTotal.toLocaleString('vi-VN')}₫
                <button class="remove-btn" data-index="${index}" title="Xoá"><i class="fas fa-trash-alt"></i></button>
              </span>
            </div>
          `;
        });
        cartItemsDiv.innerHTML = html;
        cartTotalSpan.innerHTML = `Tổng: ${totalPrice.toLocaleString('vi-VN')}₫`;

        // Gán sự kiện xoá cho các nút remove
        document.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = e.currentTarget.getAttribute('data-index');
            if (index !== null) {
              cart.splice(parseInt(index), 1);
              updateCartUI();
            }
          });
        });
      }

      // Thêm vào giỏ
      function addToCart(productId) {
        const product = menuItems.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            quantity: 1
          });
        }
        updateCartUI();
        // Hiệu ứng nhẹ: cuộn tới giỏ hàng
        document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // Xử lý sự kiện click menu (delegation)
      menuContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.add-btn');
        if (btn) {
          const id = parseInt(btn.getAttribute('data-id'));
          addToCart(id);
        }
      });

      // Nút thanh toán
      document.getElementById('checkout-btn').addEventListener('click', () => {
        if (cart.length === 0) {
          alert('🛒 Bạn chưa có món nào trong giỏ. Thêm đồ uống chill đi nào!');
          return;
        }
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const itemList = cart.map(i => `${i.name} x${i.quantity}`).join(', ');
        alert(`✨ Cảm ơn bạn đã đặt hàng tại Hương Coffee!\n📋 ${itemList}\n💵 Tổng cộng: ${total.toLocaleString('vi-VN')}₫\n☕ Chúng mình sẽ chuẩn bị đồ ngay.`);
        // Reset giỏ hàng sau demo
        cart = [];
        updateCartUI();
      });

      // Toggle giỏ hàng khi bấm icon (chỉ scroll)
      document.getElementById('cart-toggle').addEventListener('click', () => {
        document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth' });
      });

      // Khởi tạo
      renderMenu();
      updateCartUI();
    })();
  </script>
</body>
</html>
